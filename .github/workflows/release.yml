name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binaries
        run: |
          GOOS=linux   GOARCH=amd64 go build -o build/simple-agent-linux-amd64   ./cmd/
          GOOS=linux   GOARCH=arm64 go build -o build/simple-agent-linux-arm64   ./cmd/
          GOOS=darwin  GOARCH=amd64 go build -o build/simple-agent-darwin-amd64  ./cmd/
          GOOS=darwin  GOARCH=arm64 go build -o build/simple-agent-darwin-arm64  ./cmd/
          GOOS=windows GOARCH=amd64 go build -o build/simple-agent-windows-amd64.exe ./cmd/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*
          generate_release_notes: true
